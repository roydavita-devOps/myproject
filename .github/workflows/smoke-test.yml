name: Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "smoke/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - "docker-compose.yml"
      - ".github/workflows/smoke-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "smoke/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - "docker-compose.yml"
      - ".github/workflows/smoke-test.yml"
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test Docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create CI env
        run: |
          cp .env.example .env
          sed -i 's/change-me-long-random-access-secret/ci-access-secret-minimum-32-characters/' .env
          sed -i 's/change-me-long-random-refresh-secret/ci-refresh-secret-minimum-32-characters/' .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for readiness
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://localhost/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs backend nginx
          exit 1

      - name: Run smoke tests
        run: npm run smoke-test
        env:
          SMOKE_BASE_URL: http://localhost

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
